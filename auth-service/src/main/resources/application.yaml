spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://postgres:5432/tictactoe_auth_db
    username: tictactoe_user
    password: tictactoe_pass
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      pool-name: AuthServiceHikariPool

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true

    open-in-view: false

  data:
    redis:
      host: redis
      port: 6379
      password: tictactoe_redis_pass

      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  cloud:
    consul:
      host: consul
      port: 8500

      discovery:
        service-name: auth-service

server:
  port: 8081

  servlet:
    context-path: /auth

management:
  endpoints:
    web:
      exposure:
        include: health, info

  endpoint:
    health:
      show-details: always

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  access-token-expiration: 900000 # 15 minutes in milliseconds
  refresh-token-expiration: 604800000 # 7 days in milliseconds

logging:
  level:
    com.tictactoe.auth: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
